name: Build multiplayer game site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: game-site
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download base game
        run: |
          curl -L https://github.com/blueskywrld/game3/archive/refs/heads/main.zip -o /tmp/game.zip
          unzip -q /tmp/game.zip -d /tmp/game
          mkdir -p site
          cp -R /tmp/game/game3-main/. site/
      - name: Apply multiplayer patch
        run: |
          base64 --decode index_multiplayer.patch.b64 > index_multiplayer.patch
          python -m pip install bsdiff4
          python - <<'PY'
          from pathlib import Path
          import bsdiff4
          base = Path("site/index.pck").read_bytes()
          patch = Path("index_multiplayer.patch").read_bytes()
          Path("site/index.pck").write_bytes(bsdiff4.patch(base, patch))
          PY
      - name: Add web support files
        run: |
          curl -L https://raw.githubusercontent.com/SuperLiquidSoccer/SuperLiquidSoccer.github.io/main/index.service.worker.js -o site/index.service.worker.js
          curl -L https://raw.githubusercontent.com/SuperLiquidSoccer/SuperLiquidSoccer.github.io/main/index.manifest.json -o site/index.manifest.json
          touch site/.nojekyll
      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
